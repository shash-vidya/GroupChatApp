<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>💬 Real-time Group Chat</title>
  <link rel="stylesheet" href="chat.css" />
</head>
<body>
  <!-- Username Modal -->
  <div id="usernameModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="usernameModalTitle">
    <div class="modal-content">
      <h2 id="usernameModalTitle">Enter your name to join the chat</h2>
      <input
        type="text"
        id="usernameInput"
        placeholder="Your name"
        autocomplete="username"
        aria-label="Your name"
      />
      <button id="usernameSubmitBtn" class="btn primary-btn">Join Chat</button>
    </div>
  </div>

  <div class="chat-container">
    <!-- Chat Header -->
    <header class="chat-header" role="banner">
      <h1>💬 Real-time Group Chat</h1>
      <div id="currentGroupName" class="current-group-name" aria-live="polite" aria-atomic="true">
        No Group Selected
      </div>
      <button id="leaveBtn" class="btn danger-btn" disabled aria-disabled="true">Leave Chat</button>
    </header>

    <!-- Sidebar Groups List -->
    <aside class="sidebar" role="complementary" aria-label="Groups and user management">
      <h3>Groups</h3>
      <ul id="groupList" class="group-list" role="list" aria-label="Available groups"></ul>

      <!-- User Search & Manage Members Section -->
      <h3>Search & Manage Members</h3>
      <div id="userSearchSection">
        <input
          type="text"
          id="userSearchInput"
          placeholder="Search users to add..."
          autocomplete="off"
          aria-label="Search users to add"
          aria-controls="userSearchResults"
          aria-autocomplete="list"
        />
        <ul id="userSearchResults" role="listbox" aria-label="User search results"></ul>
      </div>

      <button id="createGroupBtn" class="btn primary-btn create-group-btn">+ Create Group</button>
    </aside>

    <!-- Chat Area -->
    <main class="chat-main" role="main" aria-live="polite" aria-atomic="false">
      <!-- Online Users -->
      <section id="userList" class="user-list" aria-label="Online users">
        <h3>Online Users</h3>
      </section>

      <!-- Messages -->
      <section
        id="chatBox"
        class="chat-box"
        aria-live="polite"
        aria-atomic="false"
        role="log"
        tabindex="0"
        aria-label="Chat messages"
      ></section>

      <!-- Message Input -->
      <form id="messageForm" autocomplete="off" class="message-form" novalidate>
        <input
          type="text"
          id="messageInput"
          placeholder="Type your message..."
          required
          autocomplete="off"
          disabled
          aria-label="Type your message"
        />
        <button type="submit" disabled class="btn primary-btn" aria-disabled="true">Send</button>
      </form>
    </main>
  </div>

  <!-- Create Group Modal -->
  <div id="groupModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="groupModalTitle">
    <div class="modal-content">
      <h2 id="groupModalTitle">Create New Group</h2>
      <input
        type="text"
        id="newGroupName"
        placeholder="Group name"
        autocomplete="off"
        aria-label="New group name"
      />
      <div class="modal-buttons">
        <button id="saveGroupBtn" class="btn primary-btn">Save</button>
        <button id="cancelGroupBtn" class="btn cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
